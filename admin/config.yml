backend:
  name: github
  repo: vsec2025/vietsafe-website
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

publish_mode: editorial_workflow

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "vi"

collections:
  - name: "kien-thuc"
    label: "Kiến thức PCCC"
    label_singular: "Bài viết"
    folder: "kien-thuc"
    create: true
    slug: "{{slug}}"
    extension: "html"
    format: "frontmatter"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Mô tả SEO", name: "description", widget: "string", hint: "Tối đa 160 ký tự" }
      - { label: "Danh mục", name: "category", widget: "select", options: ["PCCC & BVTV", "Thiết kế PBD", "Tiêu chuẩn quốc tế", "Thủ tục pháp lý", "Công nghệ mô phỏng"] }
      - { label: "Từ khóa SEO", name: "keywords", widget: "string" }
      - { label: "Ngày đăng", name: "date", widget: "datetime" }
      - { label: "Tác giả", name: "author", widget: "string", default: "VIETSAFE E&C" }
      - { label: "Thời gian đọc (phút)", name: "readtime", widget: "number", default: 5 }
      - { label: "Nội dung", name: "body", widget: "markdown" }
      - { label: "Ảnh đại diện", name: "thumbnail", widget: "image", required: false }

  - name: "hoat-dong"
    label: "Hoạt động công ty"
    label_singular: "Hoạt động"
    folder: "hoat-dong"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    extension: "html"
    format: "frontmatter"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Loại hoạt động", name: "type", widget: "select", options: ["Dự án", "Sự kiện", "Đào tạo", "Hội thảo", "Tin tức"] }
      - { label: "Ngày", name: "date", widget: "datetime" }
      - { label: "Mô tả ngắn", name: "excerpt", widget: "text" }
      - { label: "Nội dung chi tiết", name: "body", widget: "markdown" }
      - { label: "Ảnh", name: "image", widget: "image", required: false }
