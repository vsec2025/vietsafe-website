    // Initialize Netlify Identity - pointing to our Netlify site's identity endpoint

      window.netlifyIdentity.init({
        APIUrl: "https://velvety-empanada-1fa7e2.netlify.app/.netlify/identity"

      // Redirect to admin after successful login
      window.netlifyIdentity.on("login", function() {
        document.location.href = "/admin/";
      });
    }
  </script>
